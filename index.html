<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ABA Scheduler V4</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f5f6f8;
}
header{
  background:white;
  padding:12px;
  border-bottom:1px solid #ccc;
  position:sticky;
  top:0;
  z-index:10;
}
button,input,select{
  padding:7px;
  margin:3px;
  border-radius:6px;
  border:1px solid #aaa;
}
button.primary{
  background:#2f6fed;
  color:white;
}
.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:12px;
  padding:12px;
}
.box{
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}
.days button.active{
  background:#2f6fed;
  color:white;
}
.board{
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  overflow:auto;
}
.row{
  display:grid;
  grid-template-columns:150px repeat(3,1fr);
  gap:8px;
  margin-bottom:8px;
  min-width:1100px;
}
.staffCell{
  border:1px solid #ddd;
  border-radius:8px;
  padding:8px;
}
.staffRowEven .staffCell,
.staffRowEven .slot{
  background:white;
}
.staffRowOdd .staffCell,
.staffRowOdd .slot{
  background:#fff0f5;
}
.slot{
  border:1px dashed #aaa;
  border-radius:8px;
  min-height:115px;
  padding:6px;
}
.slot.dragover{
  outline:3px solid #93c5fd;
}
.card{
  background:white;
  border:1px solid #9bb7ff;
  border-left:6px solid #2f6fed;
  border-radius:8px;
  padding:6px;
  margin:5px 0;
  cursor:grab;
}
.card.warning{
  background:#fff3cd;
  border-color:#d39e00;
  border-left-color:#d39e00;
}
.card.searchHit{
  outline:3px solid #ffd54f;
}
.small{
  font-size:12px;
  color:#666;
}
.pool{
  min-height:120px;
  border:1px dashed #bbb;
  border-radius:8px;
  padding:8px;
}
.stat{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
  padding:5px 0;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#0006;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.modalPanel{
  background:white;
  padding:16px;
  border-radius:12px;
  width:460px;
  max-width:95vw;
}
.modalPanel label{
  display:block;
  margin-top:8px;
  font-size:12px;
  color:#666;
}
.modalPanel input,
.modalPanel select{
  width:100%;
}
.warningText{
  color:#92400e;
  font-size:12px;
}
</style>
</head>

<body>
<header>
  <b>Scheduler V4</b>
  <div class="small">
    Live Supabase version · Authorized hours · drag/drop · unscheduled pool · warning-only validation
  </div>
  <input id="searchBox" placeholder="Search initials..." oninput="renderAll()">
  <button class="primary" onclick="openSessionModal()">+ Add Appointment</button>
  <button onclick="loadData()">Refresh</button>
</header>

<div class="layout">
  <aside>
    <div class="box">
      <b>Agency Totals</b>
      <div id="totals"></div>
    </div>

    <div class="box">
      <b>Search Results</b>
      <div id="searchResults" class="small">Search client initials above.</div>
    </div>

    <div class="box">
      <b>Unscheduled Pool</b>
      <div class="small">Drag appointments here to unschedule them.</div>
      <div id="pool" class="pool" ondragover="event.preventDefault()" ondrop="dropToPool(event)"></div>
    </div>

    <div class="box">
      <b>Authorization Warnings</b>
      <div id="authWarnings"></div>
    </div>
  </aside>

  <main>
    <div class="box days" id="dayButtons"></div>
    <div class="board" id="board"></div>
  </main>
</div>

<div class="modal" id="sessionModal">
  <div class="modalPanel">
    <h3 id="modalTitle">Add Appointment</h3>
    <input type="hidden" id="sessionId">

    <label>Client</label>
    <select id="sessionClient"></select>

    <label>Staff</label>
    <select id="sessionStaff"></select>

    <label>Day</label>
    <select id="sessionDay"></select>

    <label>Category</label>
    <select id="sessionSlot">
      <option>AM</option>
      <option>Mid</option>
      <option>PM</option>
    </select>

    <label>Start Time</label>
    <input id="sessionStart" type="time" value="08:30">

    <label>End Time</label>
    <input id="sessionEnd" type="time" value="11:30">

    <label>Service Type</label>
    <input id="sessionService" value="ABA Therapy">

    <label>Status</label>
    <select id="sessionStatus">
      <option value="scheduled">scheduled</option>
      <option value="unscheduled">unscheduled</option>
    </select>

    <div id="modalWarnings" class="warningText"></div>

    <br>
    <button onclick="deleteSession()">Delete</button>
    <button onclick="duplicateSession()">Duplicate</button>
    <button onclick="closeModal()">Cancel</button>
    <button class="primary" onclick="saveSession()">Save</button>
  </div>
</div><script>
/* =========================
   SUPABASE CONNECTION
========================= */

const SUPABASE_URL =
  "https://kqmdcdulnpscjkdiaodq.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxbWRjZHVsbnBzY2prZGlhb2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTg5NTMsImV4cCI6MjA5NjA5NDk1M30.8fln9mkJhDC82Uxi6CeE4WNYapEDLueNDf7Yp5FSs_k";

const supabaseClient =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

/* =========================
   APP STATE
========================= */

let clients = [];
let staff = [];
let sessions = [];

let activeDay = "Monday";

const DAYS = [
  "Monday",
  "Tuesday",
  "Wednesday",
  "Thursday",
  "Friday"
];

const SLOTS = [
  "AM",
  "Mid",
  "PM"
];

/* =========================
   INITIAL LOAD
========================= */

window.addEventListener(
  "load",
  async () => {
    await loadData();
  }
);

/* =========================
   LOAD DATA
========================= */

async function loadData(){

  const clientResult =
    await supabaseClient
      .from("clients")
      .select("*")
      .order("initials");

  clients = clientResult.data || [];

  const staffResult =
    await supabaseClient
      .from("staff")
      .select("*")
      .order("name");

  staff = staffResult.data || [];

  const sessionResult =
    await supabaseClient
      .from("sessions")
      .select("*");

  sessions = sessionResult.data || [];

  renderAll();
}

/* =========================
   HELPERS
========================= */

function getClient(id){
  return clients.find(
    x => x.id === id
  );
}

function getStaff(id){
  return staff.find(
    x => x.id === id
  );
}

function timeToMinutes(time){

  if(!time) return 0;

  const parts =
    time.split(":");

  return (
    Number(parts[0]) * 60 +
    Number(parts[1])
  );
}

function durationHours(session){

  return (
    timeToMinutes(session.end_time) -
    timeToMinutes(session.start_time)
  ) / 60;
}

function clientHours(clientId){

  return sessions
    .filter(
      s =>
        s.client_id === clientId &&
        s.status === "scheduled"
    )
    .reduce(
      (sum,s) =>
        sum + durationHours(s),
      0
    );
}

function staffHours(staffId){

  return sessions
    .filter(
      s =>
        s.staff_id === staffId &&
        s.status === "scheduled"
    )
    .reduce(
      (sum,s) =>
        sum + durationHours(s),
      0
    );
}

function totalHours(){

  return sessions
    .filter(
      s =>
        s.status === "scheduled"
    )
    .reduce(
      (sum,s) =>
        sum + durationHours(s),
      0
    );
}

/* =========================
   OVERLAP CHECKS
========================= */

function overlaps(a,b){

  if(
    a.id === b.id ||
    a.day !== b.day ||
    a.staff_id !== b.staff_id
  ){
    return false;
  }

  return (
    timeToMinutes(a.start_time) <
    timeToMinutes(b.end_time)
    &&
    timeToMinutes(b.start_time) <
    timeToMinutes(a.end_time)
  );
}

function hasOverlap(session){

  return sessions.some(
    other =>
      overlaps(session,other)
  );
}

/* =========================
   RENDER
========================= */

function renderAll(){

  renderDayButtons();
  renderTotals();
  renderBoard();
  renderPool();
  renderWarnings();
  renderSearch();
  populateDropdowns();
}

function renderDayButtons(){

  const box =
    document.getElementById(
      "dayButtons"
    );

  box.innerHTML = "";

  DAYS.forEach(day=>{

    const button =
      document.createElement(
        "button"
      );

    button.textContent = day;

    if(day === activeDay){
      button.classList.add(
        "active"
      );
    }

    button.onclick = ()=>{
      activeDay = day;
      renderBoard();
    };

    box.appendChild(button);

  });

}

function renderTotals(){

  document.getElementById(
    "totals"
  ).innerHTML = `
    <div class="stat">
      <span>Clients</span>
      <b>${clients.length}</b>
    </div>

    <div class="stat">
      <span>Staff</span>
      <b>${staff.length}</b>
    </div>

    <div class="stat">
      <span>Hours Scheduled</span>
      <b>${totalHours().toFixed(2)}</b>
    </div>
  `;
}
</script><script>
/* =========================
   DROPDOWNS
========================= */

function populateDropdowns(){

  document.getElementById(
    "sessionClient"
  ).innerHTML =
    clients.map(
      c =>
        `<option value="${c.id}">
          ${c.initials}
        </option>`
    ).join("");

  document.getElementById(
    "sessionStaff"
  ).innerHTML =
    `<option value="">
      Unassigned
    </option>` +
    staff.map(
      s =>
        `<option value="${s.id}">
          ${s.name}
        </option>`
    ).join("");

  document.getElementById(
    "sessionDay"
  ).innerHTML =
    DAYS.map(
      d =>
        `<option>${d}</option>`
    ).join("");

}

/* =========================
   BOARD
========================= */

function renderBoard(){

  const board =
    document.getElementById(
      "board"
    );

  board.innerHTML = "";

  const header =
    document.createElement(
      "div"
    );

  header.className = "row";

  header.innerHTML = `
    <div></div>
    <div class="staffCell"><b>AM</b></div>
    <div class="staffCell"><b>Mid</b></div>
    <div class="staffCell"><b>PM</b></div>
  `;

  board.appendChild(header);

  staff.forEach(
    (staffMember,index)=>{

      const row =
        document.createElement(
          "div"
        );

      row.className =
        "row " +
        (
          index % 2 === 0
          ? "staffRowEven"
          : "staffRowOdd"
        );

      const hours =
        staffHours(
          staffMember.id
        );

      const left =
        document.createElement(
          "div"
        );

      left.className =
        "staffCell";

      left.innerHTML = `
        <b
          style="cursor:pointer"
          onclick="renameStaff('${staffMember.id}')"
        >
          ${staffMember.name}
        </b>

        <div class="small">
          ${hours.toFixed(2)} hrs
        </div>
      `;

      row.appendChild(left);

      SLOTS.forEach(slot=>{

        const cell =
          document.createElement(
            "div"
          );

        cell.className =
          "slot";

        cell.ondragover =
          e=>{
            e.preventDefault();
            cell.classList.add(
              "dragover"
            );
          };

        cell.ondragleave =
          ()=>{
            cell.classList.remove(
              "dragover"
            );
          };

        cell.ondrop =
          e=>
            dropSession(
              e,
              staffMember.id,
              activeDay,
              slot
            );

        const slotSessions =
          sessions.filter(
            s =>
              s.staff_id ===
                staffMember.id
              &&
              s.day === activeDay
              &&
              s.slot === slot
              &&
              s.status ===
                "scheduled"
          );

        slotSessions.forEach(
          s=>{
            cell.appendChild(
              sessionCard(s)
            );
          }
        );

        row.appendChild(cell);

      });

      board.appendChild(row);

    }
  );

}

/* =========================
   APPOINTMENT CARDS
========================= */

function sessionCard(session){

  const card =
    document.createElement(
      "div"
    );

  card.className =
    "card";

  if(
    hasOverlap(session)
  ){
    card.classList.add(
      "warning"
    );
  }

  const client =
    getClient(
      session.client_id
    );

  card.draggable = true;

  card.ondragstart =
    e=>{

      e.dataTransfer.setData(
        "session",
        session.id
      );

    };

  card.ondblclick =
    ()=>openSessionModal(
      session.id
    );

  card.innerHTML = `
    <b>
      ${
        client
          ? client.initials
          : "Unknown"
      }
    </b>

    <div class="small">
      ${session.start_time}
      -
      ${session.end_time}
    </div>

    ${
      hasOverlap(session)
      ? `
      <div class="warningText">
        Overlap Warning
      </div>
      `
      : ""
    }
  `;

  return card;

}

/* =========================
   DRAG DROP
========================= */

async function dropSession(
  event,
  staffId,
  day,
  slot
){

  event.preventDefault();

  const sessionId =
    event.dataTransfer.getData(
      "session"
    );

  const session =
    sessions.find(
      s => s.id === sessionId
    );

  if(!session) return;

  session.staff_id =
    staffId;

  session.day =
    day;

  session.slot =
    slot;

  session.status =
    "scheduled";

  await supabaseClient
    .from("sessions")
    .update({
      staff_id:
        session.staff_id,
      day:
        session.day,
      slot:
        session.slot,
      status:
        session.status
    })
    .eq(
      "id",
      session.id
    );

  renderAll();

}

async function dropToPool(
  event
){

  event.preventDefault();

  const sessionId =
    event.dataTransfer.getData(
      "session"
    );

  const session =
    sessions.find(
      s => s.id === sessionId
    );

  if(!session) return;

  session.status =
    "unscheduled";

  await supabaseClient
    .from("sessions")
    .update({
      status:
        "unscheduled"
    })
    .eq(
      "id",
      session.id
    );

  renderAll();

}

/* =========================
   UNSCHEDULED POOL
========================= */

function renderPool(){

  const pool =
    document.getElementById(
      "pool"
    );

  pool.innerHTML = "";

  sessions
    .filter(
      s =>
        s.status ===
        "unscheduled"
    )
    .forEach(
      s =>
        pool.appendChild(
          sessionCard(s)
        )
    );

}

/* =========================
   AUTHORIZATION WARNINGS
========================= */

function renderWarnings(){

  const box =
    document.getElementById(
      "authWarnings"
    );

  box.innerHTML = "";

  clients.forEach(
    client=>{

      const scheduled =
        clientHours(
          client.id
        );

      const auth =
        Number(
          client.authorized_hours
        );

      if(
        scheduled > auth
      ){

        box.innerHTML += `
          <div class="warningText">
            ⚠
            ${client.initials}
            is
            ${(scheduled-auth)
              .toFixed(2)}
            hrs over authorization
          </div>
        `;

      }

    }
  );

}

/* =========================
   SEARCH
========================= */

function renderSearch(){

  const text =
    document
      .getElementById(
        "searchBox"
      )
      .value
      .trim()
      .toLowerCase();

  const results =
    document.getElementById(
      "searchResults"
    );

  if(!text){

    results.innerHTML =
      "Search client initials.";

    return;
  }

  const matches =
    clients.filter(
      c =>
        c.initials
          .toLowerCase()
          .includes(text)
    );

  results.innerHTML =
    matches.map(
      c =>
        `<div>
          ${c.initials}
        </div>`
    ).join("");

}
</script>

<script>
/* ADD / EDIT SESSION */

function openSessionModal(id=null){
  populateDropdowns();

  const s = id
    ? sessions.find(x => x.id === id)
    : null;

  sessionId.value = s ? s.id : "";
  sessionClient.value = s ? s.client_id : clients[0]?.id;
  sessionStaff.value = s ? s.staff_id : "";
  sessionDay.value = s ? s.day : activeDay;
  sessionSlot.value = s ? s.slot : "AM";
  sessionStart.value = s ? s.start_time : "08:30";
  sessionEnd.value = s ? s.end_time : "11:30";
  sessionService.value = s ? s.service_type : "ABA Therapy";
  sessionStatus.value = s ? s.status : "scheduled";

  sessionModal.style.display = "flex";
}

function closeModal(){
  sessionModal.style.display = "none";
}

async function saveSession(){
  const id = sessionId.value;
  
  if(!sessionClient.value){
  alert("Please select a client before saving.");
  return;
}
  
  const payload = {
    client_id: sessionClient.value || null,
    staff_id: sessionStaff.value || null,
    day: sessionDay.value,
    slot: sessionSlot.value,
    start_time: sessionStart.value,
    end_time: sessionEnd.value,
    service_type: sessionService.value,
    status: sessionStatus.value,
    updated_at: new Date().toISOString()
  };

  if(!payload.staff_id){
    payload.status = "unscheduled";
  }

  if(id){
    await supabaseClient
      .from("sessions")
      .update(payload)
      .eq("id", id);
  } else {
    await supabaseClient
      .from("sessions")
      .insert(payload);
  }

  closeModal();
  await loadData();
}

async function deleteSession(){
  if(!sessionId.value) return closeModal();

  if(!confirm("Delete this appointment?")) return;

  await supabaseClient
    .from("sessions")
    .delete()
    .eq("id", sessionId.value);

  closeModal();
  await loadData();
}

/* DUPLICATE SESSION */

async function duplicateSession(){
  if(!sessionId.value){
    alert("Open an existing appointment first.");
    return;
  }

  const original =
    sessions.find(x => x.id === sessionId.value);

  if(!original) return;

  const input = prompt(
    "Copy to which day(s)? Example: W,F or Wednesday,Friday"
  );

  if(!input) return;

  const map = {
    m:"Monday", mon:"Monday", monday:"Monday",
    t:"Tuesday", tue:"Tuesday", tuesday:"Tuesday",
    w:"Wednesday", wed:"Wednesday", wednesday:"Wednesday",
    th:"Thursday", thu:"Thursday", thursday:"Thursday",
    f:"Friday", fri:"Friday", friday:"Friday"
  };

  const rows = input
    .split(",")
    .map(x => x.trim().toLowerCase())
    .map(x => map[x])
    .filter(Boolean)
    .map(day => ({
      client_id: original.client_id,
      staff_id: original.staff_id,
      day,
      slot: original.slot,
      start_time: original.start_time,
      end_time: original.end_time,
      service_type: original.service_type,
      status: original.status,
      notes: original.notes || ""
    }));

  if(rows.length){
    await supabaseClient
      .from("sessions")
      .insert(rows);
  }

  closeModal();
  await loadData();
}

/* RENAME STAFF */

async function renameStaff(staffId){
  const s = staff.find(x => x.id === staffId);
  if(!s) return;

  const newName = prompt("Edit staff name:", s.name);

  if(!newName || !newName.trim()) return;

  await supabaseClient
    .from("staff")
    .update({ name: newName.trim() })
    .eq("id", staffId);

  await loadData();
}

/* REALTIME SYNC */

supabaseClient
  .channel("scheduler-live")
  .on(
    "postgres_changes",
    { event:"*", schema:"public", table:"sessions" },
    () => loadData()
  )
  .on(
    "postgres_changes",
    { event:"*", schema:"public", table:"clients" },
    () => loadData()
  )
  .on(
    "postgres_changes",
    { event:"*", schema:"public", table:"staff" },
    () => loadData()
  )
  .subscribe();
</script>

</body>
</html>
